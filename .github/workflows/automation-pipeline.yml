name: automation-pipeline

on:
  workflow_dispatch:
    inputs:
      req_id:
        description: "Optional REQ id (e.g. REQ-01)"
        required: false
        type: string
  schedule:
    - cron: "*/30 * * * *"

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Authenticate gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Run deterministic orchestrator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GIT_AGENT_TOKEN_DEV: ${{ secrets.GIT_AGENT_TOKEN_DEV }}
          GIT_AGENT_USERNAME_DEV: ${{ vars.GIT_AGENT_USERNAME_DEV }}
          GIT_AGENT_EMAIL_DEV: ${{ vars.GIT_AGENT_EMAIL_DEV }}
          GIT_AGENT_TOKEN_REVIEW: ${{ secrets.GIT_AGENT_TOKEN_REVIEW }}
          GIT_AGENT_USERNAME_REVIEW: ${{ vars.GIT_AGENT_USERNAME_REVIEW }}
          GIT_AGENT_TOKEN_TEST: ${{ secrets.GIT_AGENT_TOKEN_TEST }}
          GIT_AGENT_USERNAME_TEST: ${{ vars.GIT_AGENT_USERNAME_TEST }}
          GIT_AGENT_TOKEN_MERGE: ${{ secrets.GIT_AGENT_TOKEN_MERGE }}
          AUTOMATION_STRICT_HUMAN_REVIEW: ${{ vars.AUTOMATION_STRICT_HUMAN_REVIEW }}
          AUTOMATION_STRICT_HUMAN_QA: ${{ vars.AUTOMATION_STRICT_HUMAN_QA }}
          GITHUB_REPO: ${{ github.repository }}
          REPO_ROOT: ${{ github.workspace }}
          STATE_FILE: state/req-status.json
          COVERAGE_MIN: "80"
        run: |
          if [ -n "${{ inputs.req_id }}" ]; then
            mc-auto run-once --req-id "${{ inputs.req_id }}"
          else
            mc-auto run-once
          fi

      - name: Persist state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/req-status.json || true
          git diff --cached --quiet || git commit -m "chore: update automation state"
          git push || true
